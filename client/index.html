<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Designs By TA * Web Design Agency Boston MA</title>
    <meta name="description" content="Designs By TA is a freelance web design agency in Boston, MA. We build high-performance websites, brand identities, and digital experiences that drive real results." />
    <link rel="canonical" href="https://designsbyta.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Designs By TA — Web Design Agency Boston MA" />
    <meta property="og:description" content="Boston-based freelance web design agency building high-performance websites and brand identities." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://designsbyta.com/" />
    <meta property="og:image" content="https://designsbyta.com/imgs/hero-desk.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Designs By TA — Web Design Agency Boston MA" />
    <meta name="twitter:description" content="Boston-based freelance web design agency building high-performance websites and brand identities." />
    <meta name="twitter:image" content="https://designsbyta.com/imgs/hero-desk.png" />

    <!-- Font preloads (Satoshi from local /fonts/) -->
    <link rel="preload" href="/fonts/Satoshi-Black.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Regular.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Hero image preload -->
    <link rel="preload" href="/imgs/hero-desk.png" as="image" />

    <!-- JSON-LD LocalBusiness schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Designs By TA",
      "description": "Freelance web design agency in Boston, MA specializing in high-performance websites, brand identity, SEO, and e-commerce.",
      "url": "https://designsbyta.com",
      "telephone": "",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Boston",
        "addressRegion": "MA",
        "addressCountry": "US"
      },
      "priceRange": "$$",
      "serviceArea": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 42.3601,
          "longitude": -71.0589
        },
        "geoRadius": "50000"
      },
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
